    window.setTimeout = function(fn, delay, ...args) {
      if (delay === 1800 || delay === 500) return _origSetTimeout(fn, 0, ...args);
      return _origSetTimeout(fn, delay, ...args);

<body>

<!-- Splash screen -->
<div id="splash">
  <div class="splash-logo">💰</div>
  <h1 class="splash-title">Smart Money</h1>
  <p class="splash-sub">מעקב פיננסי אישי חכם</p>
  <div class="splash-loader"></div>
</div>

<!-- Auth shell -->
<div id="auth-shell" style="display:none">
  <main class="auth-screen">
    <section class="auth-panel">
      <div class="auth-brand">
        <div class="auth-logo">💰</div>
        <div><h1>Smart Money</h1><p>ניהול פיננסי אישי</p></div>
      </div>
      <div id="auth-content"></div>
    </section>
  </main>
</div>

<!-- App shell -->
<div id="app-shell" style="display:none">

  <aside id="sidebar">
    <div class="sidebar-brand">
      <div class="sidebar-logo-wrap"><div class="sidebar-logo">💰</div></div>
      <div class="sidebar-brand-copy">
        <div class="sidebar-title">Smart Money</div>
        <div class="sidebar-subtitle">ניהול פיננסי אישי</div>
      </div>
    </div>
    <nav class="sidebar-nav">
      <button class="nav-btn" data-view="dashboard"><span class="nav-icon">🏠</span><span class="nav-label">לוח בקרה</span></button>
      <button class="nav-btn" data-view="income"><span class="nav-icon">💰</span><span class="nav-label">הכנסות</span></button>
      <button class="nav-btn" data-view="expenses"><span class="nav-icon">💸</span><span class="nav-label">הוצאות</span></button>
      <button class="nav-btn" data-view="budget"><span class="nav-icon">🎯</span><span class="nav-label">תקציב</span></button>
      <button class="nav-btn" data-view="analysis"><span class="nav-icon">📊</span><span class="nav-label">ניתוח</span></button>
      <button class="nav-btn" data-view="profile"><span class="nav-icon">👤</span><span class="nav-label">פרופיל</span></button>
    </nav>
    <div class="sidebar-footer">
      <div class="sidebar-footer-card">
        <div class="sidebar-footer-text">תכל׳ס</div>
        <div class="sidebar-footer-sub">תזרים · תקציב · ניתוח</div>
      </div>
    </div>
  </aside>

  <div id="app-right">
    <header id="header">
      <div class="header-inner">
        <span id="header-title">לוח בקרה</span>
        <div class="header-right">
          <div class="month-nav">
            <button class="month-nav-btn" onclick="nextMonth()">‹</button>
            <button id="month-label" class="month-nav-label" onclick="openPeriodPicker()" type="button"></button>
            <button class="month-nav-btn" onclick="prevMonth()">›</button>
          </div>
        </div>
      </div>
    </header>
    <main id="main">
      <div id="view-dashboard" class="view"></div>
      <div id="view-income"    class="view"></div>
      <div id="view-expenses"  class="view"></div>
      <div id="view-budget"    class="view"></div>
      <div id="view-analysis"  class="view"></div>
      <div id="view-profile"   class="view"></div>
    </main>
    <nav id="bottom-nav">
      <button class="nav-btn" data-view="dashboard"><div class="nav-icon-wrap"><span class="nav-icon">🏠</span></div><span class="nav-label">בית</span></button>
      <button class="nav-btn" data-view="income"><div class="nav-icon-wrap"><span class="nav-icon">💰</span></div><span class="nav-label">הכנסות</span></button>
      <button class="nav-btn" data-view="expenses"><div class="nav-icon-wrap"><span class="nav-icon">💸</span></div><span class="nav-label">הוצאות</span></button>

    </nav>
  </div>

</div>

<div id="modal-overlay">
  <div id="modal-sheet">
    <div class="modal-handle"></div>
    <div id="modal-content"></div>
  </div>
</div>
<div id="toast"></div>

<script src="app.js?v=27"></script>
</body>
</html>
